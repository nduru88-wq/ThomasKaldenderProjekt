<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Dagens Aftaler</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #007BFF;
        color: white;
        text-align: center;
    }

    h1 {
        margin-top: 40px;
        font-size: 2.5em;
    }

    .event {
        background: rgba(255,255,255,0.2);
        margin: 15px auto;
        padding: 20px;
        border-radius: 12px;
        width: 80%;
        max-width: 600px;
        font-size: 1.3em;
    }

    .time {
        font-weight: bold;
        font-size: 1.5em;
    }
</style>
</head>
<body>

<h1 id="weekday"></h1>
<div id="events"></div>

<script>
const ICS_URL = "https://calendar.google.com/calendar/ical/789cdf1ca22136e8ad24617712865cebe2dcfb4523f009c4b0be34a93d74a881%40group.calendar.google.com/public/basic.ics";

// Proxy (for at undgå CORS problemer)
const PROXY = "https://api.allorigins.win/raw?url=";

// Ugedage
const weekdays = ["Søndag","Mandag","Tirsdag","Onsdag","Torsdag","Fredag","Lørdag"];
document.getElementById("weekday").innerText = weekdays[new Date().getDay()];

// Parse ICS
function parseICS(data) {
    const events = [];
    const lines = data.split("\n");

    let event = null;

    lines.forEach(line => {
        if (line.startsWith("BEGIN:VEVENT")) {
            event = {};
        } 
        else if (line.startsWith("END:VEVENT")) {
            events.push(event);
        } 
        else if (event) {
            if (line.startsWith("SUMMARY:")) {
                event.summary = line.replace("SUMMARY:", "");
            }
            if (line.startsWith("DTSTART")) {
                event.start = line.split(":")[1];
            }
        }
    });

    return events;
}

// Konverter dato
function parseDate(dateStr) {
    if (!dateStr) return null;

    return new Date(
        dateStr.substring(0,4),
        dateStr.substring(4,6)-1,
        dateStr.substring(6,8),
        dateStr.substring(9,11) || 0,
        dateStr.substring(11,13) || 0
    );
}

// Hent og vis events
async function loadEvents() {
    try {
        const res = await fetch(PROXY + encodeURIComponent(ICS_URL));
        const text = await res.text();

        const events = parseICS(text);
        const today = new Date();

        const container = document.getElementById("events");
        container.innerHTML = "";

        const todaysEvents = events.filter(e => {
            const d = parseDate(e.start);
            if (!d) return false;
            return d.toDateString() === today.toDateString();
        });

        if (todaysEvents.length === 0) {
            container.innerHTML = "<p>Ingen aftaler i dag</p>";
            return;
        }

        todaysEvents.forEach(e => {
            const d = parseDate(e.start);

            const div = document.createElement("div");
            div.className = "event";

            div.innerHTML = `
                <div class="time">
                    ${d.toLocaleTimeString("da-DK", {hour:"2-digit", minute:"2-digit"})}
                </div>
                <div>${e.summary}</div>
            `;

            container.appendChild(div);
        });

    } catch (error) {
        console.error("Fejl ved hentning:", error);
        document.getElementById("events").innerHTML = "<p>Fejl ved indlæsning</p>";
    }
}

// Kør med det samme
loadEvents();

// Opdater hvert minut
setInterval(() => {
    loadEvents();
}, 60000);

</script>

</body>
</html>
